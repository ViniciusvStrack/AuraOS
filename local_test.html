<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>AuraMed | Intelligence Clinical Layer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap');
        body { background: #f0f4f8; color: #1e293b; font-family: 'Outfit', sans-serif; }
        .medical-card { background: white; border-radius: 24px; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05); }
        .alert-pulse { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); } 70% { box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
        .sidebar { background: #0f172a; color: white; }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <!-- Navigation Sidebar -->
    <aside class="w-20 lg:w-64 sidebar p-6 flex flex-col items-center lg:items-start">
        <div class="flex items-center gap-3 mb-12">
            <div class="bg-blue-600 p-2 rounded-xl text-white"><i data-lucide="stethoscopes" class="w-6 h-6"></i></div>
            <span class="text-xl font-bold hidden lg:block tracking-tighter">Aura<span class="text-blue-500">Med</span></span>
        </div>
        <nav class="space-y-6 w-full">
            <a href="#" class="flex items-center gap-4 text-blue-400 font-semibold p-3 bg-blue-500/10 rounded-xl">
                <i data-lucide="layout-grid" class="w-5 h-5"></i> <span class="hidden lg:block">Dashboard</span>
            </a>
            <a href="#" class="flex items-center gap-4 text-gray-400 hover:text-white p-3 transition">
                <i data-lucide="users" class="w-5 h-5"></i> <span class="hidden lg:block">Pacientes</span>
            </a>
            <a href="#" class="flex items-center gap-4 text-gray-400 hover:text-white p-3 transition">
                <i data-lucide="book-open-check" class="w-5 h-5"></i> <span class="hidden lg:block">Protocolos</span>
            </a>
        </nav>
        <div class="mt-auto pt-6 border-t border-white/10 w-full">
            <p class="text-[10px] text-gray-500 font-bold uppercase hidden lg:block">Conectado ao HIS</p>
            <div class="flex items-center gap-2 mt-2">
                <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
                <span class="text-[10px] text-green-500 font-bold hidden lg:block">Sincronização Ativa</span>
            </div>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 p-8 overflow-y-auto">
        <header class="flex justify-between items-center mb-10">
            <h2 class="text-3xl font-extrabold text-slate-800 tracking-tight">Análise de Caso Clínico</h2>
            <div class="flex gap-4">
                <div class="bg-white px-4 py-2 rounded-full border border-slate-200 text-sm flex items-center gap-2">
                    <i data-lucide="calendar" class="w-4 h-4"></i> 2026-07-02
                </div>
                <div class="w-10 h-10 rounded-full bg-slate-200 overflow-hidden border-2 border-white shadow-sm">
                    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=doctor" alt="avatar">
                </div>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Input Clinical -->
            <div class="lg:col-span-1 space-y-6">
                <div class="medical-card p-8">
                    <h3 class="text-lg font-bold mb-4 flex items-center gap-2">
                        <i data-lucide="file-text" class="text-blue-600"></i> Entrada de Dados
                    </h3>
                    <p class="text-xs text-slate-500 mb-6">Insira a evolução do paciente, prescrição ou queixas para análise imediata de segurança e protocolos.</p>
                    <textarea id="case-input" class="w-full h-64 bg-slate-50 border-0 rounded-2xl p-4 text-sm focus:ring-2 focus:ring-blue-500 outline-none transition" placeholder="Ex: Paciente com febre alta (39°C), taquicardia e hipotensão. Prescrito Varfarina e AAS..."></textarea>
                    <button onclick="analyzeCase()" class="w-full mt-6 bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-2xl font-bold shadow-lg shadow-blue-500/20 transition transform active:scale-95">
                        Processar Inteligência
                    </button>
                </div>
            </div>

            <!-- Feed de Alertas -->
            <div class="lg:col-span-2 space-y-6">
                <div class="flex justify-between items-center">
                    <h3 class="text-sm font-bold text-slate-500 uppercase tracking-widest">Feed de Segurança do Paciente</h3>
                    <span class="px-3 py-1 bg-blue-100 text-blue-600 rounded-full text-[10px] font-bold">ALERTA EM TEMPO REAL</span>
                </div>
                <div id="case-feed" class="space-y-4">
                    <!-- Logs Clínicos dinâmicos -->
                </div>
            </div>
        </div>
    </main>

    <script>
        const API = "http://localhost:8000";

        async function analyzeCase() {
            const text = document.getElementById('case-input').value;
            if(!text) return;
            const res = await fetch(`${API}/analyze_case`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({text})
            });
            document.getElementById('case-input').value = "";
            loadDashboard();
        }

        async function loadDashboard() {
            const res = await fetch(`${API}/hospital_dashboard`);
            const data = await res.json();
            const feed = document.getElementById('case-feed');

            feed.innerHTML = data.recent_cases.map(caseLog => `
                <div class="medical-card p-6 ${caseLog.risk === 'ALTO' ? 'border-l-8 border-red-500 alert-pulse' : 'border-l-8 border-green-500'}">
                    <div class="flex justify-between mb-4">
                        <span class="text-[10px] font-bold text-slate-400">${caseLog.ts}</span>
                        <span class="px-3 py-1 rounded-full text-[10px] font-black uppercase ${caseLog.risk === 'ALTO' ? 'bg-red-100 text-red-600' : 'bg-green-100 text-green-600'}">
                            Risco: ${caseLog.risk}
                        </span>
                    </div>
                    <p class="text-sm font-semibold text-slate-800 mb-4 leading-relaxed">"${caseLog.input}"</p>
                    <div class="space-y-3">
                        ${caseLog.analysis.map(an => `
                            <div class="p-4 bg-slate-50 rounded-2xl border border-slate-100">
                                <div class="flex items-center gap-2 mb-2">
                                    <span class="text-[8px] bg-slate-200 px-2 py-0.5 rounded-full font-bold uppercase">${an.category}</span>
                                    <span class="text-xs font-black text-slate-700 uppercase">${an.topic}</span>
                                </div>
                                <p class="text-xs text-slate-600 leading-snug">${an.insight}</p>
                            </div>
                        `).join('')}
                        ${caseLog.analysis.length === 0 ? '<p class="text-xs text-green-600 font-bold italic">✓ Nenhuma violação de protocolo ou interação medicamentosa detectada.</p>' : ''}
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        setInterval(loadDashboard, 5000);
        loadDashboard();
    </script>
</body>
</html>
