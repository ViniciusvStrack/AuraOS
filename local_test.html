<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>AuraOS | Advanced Intelligence Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background: #020617; color: #f8fafc; font-family: 'Inter', sans-serif; }
        .brain-card { background: radial-gradient(circle at top left, rgba(30, 64, 175, 0.1), transparent); border: 1px solid rgba(255,255,255,0.05); }
        .severity-Alta { border-left: 4px solid #ef4444; background: rgba(239, 68, 68, 0.05); }
        .severity-Média { border-left: 4px solid #f59e0b; background: rgba(245, 158, 11, 0.05); }
        .severity-Informativa { border-left: 4px solid #3b82f6; background: rgba(59, 130, 246, 0.05); }
    </style>
</head>
<body class="p-8">
    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-12">
            <div>
                <h1 class="text-4xl font-black tracking-tighter italic">AURA<span class="text-blue-600">.OS</span></h1>
                <p class="text-blue-400/60 font-mono text-xs uppercase tracking-widest mt-1">Advanced Reasoning Engine v3.0</p>
            </div>
            <div class="text-right">
                <p class="text-[10px] text-gray-500 font-bold uppercase">Maturidade do Cérebro</p>
                <div class="flex items-center gap-2 mt-1">
                    <div class="w-48 h-2 bg-gray-800 rounded-full overflow-hidden">
                        <div id="maturity-bar" class="h-full bg-blue-600" style="width: 85%"></div>
                    </div>
                    <span id="knowledge-count" class="text-xs font-bold">0 Conhecimentos</span>
                </div>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Central de Comando -->
            <div class="space-y-6">
                <div class="brain-card p-6 rounded-3xl">
                    <h3 class="font-bold mb-4 flex items-center gap-2"><i data-lucide="zap" class="w-4 h-4"></i> Entrada de Dados</h3>
                    <textarea id="data-input" class="w-full h-40 bg-black/50 border border-white/10 rounded-2xl p-4 text-sm focus:border-blue-500 outline-none transition-all" placeholder="Digite uma conversa, decisão ou estratégia..."></textarea>
                    <button onclick="processData()" class="w-full mt-4 bg-blue-600 hover:bg-blue-500 text-white py-4 rounded-2xl font-bold transition shadow-lg shadow-blue-900/20">Analisar Contexto</button>
                </div>

                <div class="brain-card p-6 rounded-3xl opacity-50">
                    <h3 class="font-bold mb-2 text-xs">Categorias Dominadas</h3>
                    <div class="flex flex-wrap gap-2">
                        <span class="text-[10px] bg-blue-500/10 px-2 py-1 rounded-md">Engenharia</span>
                        <span class="text-[10px] bg-purple-500/10 px-2 py-1 rounded-md">Jurídico</span>
                        <span class="text-[10px] bg-green-500/10 px-2 py-1 rounded-md">Financeiro</span>
                        <span class="text-[10px] bg-amber-500/10 px-2 py-1 rounded-md">Estratégia</span>
                        <span class="text-[10px] bg-red-500/10 px-2 py-1 rounded-md">RH</span>
                    </div>
                </div>
            </div>

            <!-- Feed de Inteligência -->
            <div class="lg:col-span-2 space-y-4">
                <h2 class="text-sm font-bold text-gray-500 uppercase tracking-widest px-2">Feed de Análise em Tempo Real</h2>
                <div id="intelligence-feed" class="space-y-4">
                    <!-- Dinâmico -->
                </div>
            </div>
        </div>
    </div>

    <script>
        const API = "http://localhost:8000";

        async function updateStats() {
            const res = await fetch(`${API}/stats`);
            const data = await res.json();
            document.getElementById('knowledge-count').innerText = `${data.knowledge_base_size} Tópicos Aprendidos`;
            
            const feed = document.getElementById('intelligence-feed');
            feed.innerHTML = data.history.map(item => `
                <div class="p-6 rounded-3xl brain-card severity-${item.severity} transition-all">
                    <div class="flex justify-between mb-4">
                        <span class="text-[10px] font-bold px-2 py-1 bg-black/40 rounded italic">Input: "${item.input.substring(0, 50)}..."</span>
                        <span class="text-[10px] font-mono text-gray-500">${item.ts}</span>
                    </div>
                    ${item.analysis.length > 0 ? 
                        item.analysis.map(an => `
                            <div class="mb-4 last:mb-0">
                                <div class="flex items-center gap-2 mb-1">
                                    <span class="text-xs font-black text-blue-400 uppercase tracking-tighter">${an.area} > ${an.topic}</span>
                                    <span class="text-[8px] px-1 bg-white/5 rounded text-gray-400">${an.level}</span>
                                </div>
                                <p class="text-sm text-gray-300">${an.insight}</p>
                            </div>
                        `).join('') 
                        : '<p class="text-xs text-green-500 font-bold">✓ Fluxo limpo e em conformidade com as diretrizes aprendidas.</p>'
                    }
                </div>
            `).join('');
            lucide.createIcons();
        }

        async function processData() {
            const text = document.getElementById('data-input').value;
            if(!text) return;
            await fetch(`${API}/analyze`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({text})
            });
            document.getElementById('data-input').value = "";
            updateStats();
        }

        setInterval(updateStats, 5000);
        updateStats();
    </script>
</body>
</html>
