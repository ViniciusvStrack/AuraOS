<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>AuraMed Enterprise | Portal Clínico</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap');
        body { background: #f8fafc; color: #0f172a; font-family: 'Plus Jakarta Sans', sans-serif; }
        .sidebar { background: #1e293b; color: white; }
        .glass-card { background: white; border-radius: 24px; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .btn-medical { background: #2563eb; color: white; transition: all 0.2s; }
        .btn-medical:hover { background: #1d4ed8; transform: translateY(-1px); }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <!-- Sidebar -->
    <aside class="w-64 sidebar p-6 flex flex-col h-full">
        <div class="flex items-center gap-3 mb-10">
            <div class="bg-blue-500 p-2 rounded-lg text-white"><i data-lucide="activity" class="w-5 h-5"></i></div>
            <span class="text-xl font-bold tracking-tighter italic">AuraMed <span class="text-blue-400">Pro</span></span>
        </div>
        
        <nav class="space-y-2 flex-1">
            <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-4">Módulos</p>
            <button onclick="switchTab('diag')" class="w-full flex items-center gap-3 p-3 rounded-xl bg-white/5 hover:bg-white/10 transition text-sm">
                <i data-lucide="brain-circuit" class="w-4 h-4"></i> Diagnóstico IA
            </button>
            <button onclick="switchTab('agenda')" class="w-full flex items-center gap-3 p-3 rounded-xl hover:bg-white/10 transition text-sm">
                <i data-lucide="calendar" class="w-4 h-4"></i> Minha Agenda
            </button>
        </nav>
        
        <div class="mt-auto p-4 bg-blue-600/10 rounded-2xl">
            <p class="text-[10px] font-bold text-blue-400 uppercase">Especialidade Ativa</p>
            <select id="specialty-selector" class="bg-transparent text-xs font-bold w-full outline-none mt-1">
                <option value="Clínica Médica">Clínica Médica</option>
                <option value="Pediatria">Pediatria</option>
                <option value="Cardiologia">Cardiologia</option>
                <option value="Ginecologia">Ginecologia</option>
                <option value="Ortopedia">Ortopedia</option>
                <option value="Psiquiatria">Psiquiatria</option>
                <option value="Dermatologia">Dermatologia</option>
            </select>
        </div>
    </aside>

    <!-- Content -->
    <main class="flex-1 p-10 overflow-y-auto">
        <!-- Diagnóstico View -->
        <div id="view-diag" class="space-y-8 animate-in fade-in duration-500">
            <header>
                <h1 class="text-3xl font-extrabold tracking-tight">Assistente de Diagnóstico</h1>
                <p class="text-gray-500">Insira os sintomas para receber sugestões baseadas em evidências.</p>
            </header>

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                <div class="glass-card p-8">
                    <h3 class="font-bold mb-4 flex items-center gap-2"><i data-lucide="user-search" class="text-blue-500"></i> Anamnese</h3>
                    <textarea id="symptoms-input" class="w-full h-48 bg-gray-50 rounded-2xl p-4 text-sm border-0 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="Ex: Paciente com tosse persistente há 3 dias, febre e catarro amarelado..."></textarea>
                    <button onclick="runDiag()" class="w-full mt-6 btn-medical py-4 rounded-2xl font-bold shadow-lg shadow-blue-500/20">Analisar Caso</button>
                </div>

                <div class="space-y-4">
                    <h3 class="text-xs font-bold text-gray-400 uppercase tracking-widest px-2">Possíveis Condutas e Exames</h3>
                    <div id="diag-results" class="space-y-4">
                        <div class="text-center py-20 text-gray-400 italic text-sm">Aguardando entrada de dados do paciente...</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Agenda View (Hidden by default) -->
        <div id="view-agenda" class="hidden space-y-8">
            <header class="flex justify-between items-center">
                <h1 class="text-3xl font-extrabold tracking-tight">Escala de Plantões</h1>
                <button onclick="openDutyModal()" class="bg-blue-600 text-white px-6 py-2 rounded-xl text-sm font-bold">+ Novo Plantão</button>
            </header>
            
            <div class="glass-card overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-gray-50 border-b">
                        <tr>
                            <th class="p-4 text-xs font-bold text-gray-500 uppercase">Data</th>
                            <th class="p-4 text-xs font-bold text-gray-500 uppercase">Profissional</th>
                            <th class="p-4 text-xs font-bold text-gray-500 uppercase">Turno</th>
                            <th class="p-4 text-xs font-bold text-gray-500 uppercase">Local</th>
                        </tr>
                    </thead>
                    <tbody id="duty-table-body">
                        <!-- Dinâmico -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Modal Adicionar Plantão (Simples) -->
    <div id="duty-modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50">
        <div class="bg-white p-8 rounded-3xl w-96">
            <h3 class="font-bold mb-6 text-xl">Novo Agendamento</h3>
            <div class="space-y-4">
                <input id="duty-name" type="text" placeholder="Seu Nome" class="w-full p-3 bg-gray-100 rounded-xl outline-none">
                <input id="duty-date" type="date" class="w-full p-3 bg-gray-100 rounded-xl outline-none">
                <select id="duty-shift" class="w-full p-3 bg-gray-100 rounded-xl outline-none">
                    <option>Diurno (07h - 19h)</option>
                    <option>Noturno (19h - 07h)</option>
                    <option>24 Horas</option>
                </select>
                <input id="duty-loc" type="text" placeholder="Unidade (ex: Hospital Santa Cruz)" class="w-full p-3 bg-gray-100 rounded-xl outline-none">
                <div class="flex gap-4 mt-6">
                    <button onclick="closeDutyModal()" class="flex-1 bg-gray-200 py-3 rounded-xl font-bold">Cancelar</button>
                    <button onclick="saveDuty()" class="flex-1 bg-blue-600 text-white py-3 rounded-xl font-bold">Salvar</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API = "http://localhost:8000";

        function switchTab(tab) {
            document.getElementById('view-diag').classList.toggle('hidden', tab !== 'diag');
            document.getElementById('view-agenda').classList.toggle('hidden', tab !== 'agenda');
            if(tab === 'agenda') loadDuties();
        }

        async function runDiag() {
            const specialty = document.getElementById('specialty-selector').value;
            const text = document.getElementById('symptoms-input').value;
            if(!text) return;

            const res = await fetch(`${API}/clinical_ai`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({specialty, text})
            });
            const data = await res.json();
            
            const resultsDiv = document.getElementById('diag-results');
            if(data.results.length === 0) {
                resultsDiv.innerHTML = '<div class="p-6 glass-card text-amber-600 text-sm font-bold">Sintomas inconclusivos para esta área. Recomenda-se exame físico detalhado.</div>';
                return;
            }

            resultsDiv.innerHTML = data.results.map(r => `
                <div class="glass-card p-6 border-l-4 ${r.priority === 'Crítica' ? 'border-red-500' : 'border-blue-500'}">
                    <p class="text-[10px] font-bold text-gray-400 uppercase mb-1">Diagnóstico Provável</p>
                    <h4 class="text-lg font-bold text-slate-800 mb-4">${r.possible_diagnosis}</h4>
                    <div class="p-4 bg-blue-50 rounded-xl">
                        <p class="text-[10px] font-bold text-blue-600 uppercase mb-1 italic">Exames Sugeridos</p>
                        <p class="text-sm font-semibold">${r.suggested_exams}</p>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function openDutyModal() { document.getElementById('duty-modal').classList.remove('hidden'); }
        function closeDutyModal() { document.getElementById('duty-modal').classList.add('hidden'); }

        async function saveDuty() {
            const doctor = document.getElementById('duty-name').value;
            const date = document.getElementById('duty-date').value;
            const shift = document.getElementById('duty-shift').value;
            const location = document.getElementById('duty-loc').value;

            await fetch(`${API}/add_duty`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({doctor, date, shift, location})
            });
            closeDutyModal();
            loadDuties();
        }

        async function loadDuties() {
            const res = await fetch(`${API}/get_duties`);
            const data = await res.json();
            const tbody = document.getElementById('duty-table-body');
            tbody.innerHTML = data.map(d => `
                <tr class="border-b hover:bg-gray-50 transition">
                    <td class="p-4 text-sm font-medium">${d.date}</td>
                    <td class="p-4 text-sm">${d.doctor}</td>
                    <td class="p-4 text-sm"><span class="px-2 py-1 bg-blue-100 text-blue-600 rounded text-[10px] font-bold">${d.shift}</span></td>
                    <td class="p-4 text-sm text-gray-500">${d.location}</td>
                </tr>
            `).join('');
        }

        lucide.createIcons();
    </script>
</body>
</html>
